<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>М_Фабрика — Кулисы и Снег</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: #050818;
  color: #fff;
  overflow-x: hidden;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9999;
  background: rgba(5,8,24,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
}
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 20px;
  transition: 0.3s;
}
.nav-links a:hover, .nav-links a.active {
  color: #fff;
  background: rgba(255,255,255,0.08);
}

/* ===== SCROLL INDICATOR ===== */
.scroll-hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9998;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: scrollPulse 2s ease-in-out infinite;
  pointer-events: none;
  transition: opacity 0.5s;
}
.scroll-hint span {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.35);
}
.scroll-hint .arrow {
  width: 20px;
  height: 20px;
  border-right: 1.5px solid rgba(255,255,255,0.3);
  border-bottom: 1.5px solid rgba(255,255,255,0.3);
  transform: rotate(45deg);
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) translateY(0); }
  50% { opacity: 1; transform: translateX(-50%) translateY(6px); }
}

/* ===== CURTAIN SECTION ===== */
#curtain-section {
  position: relative;
  height: 300vh; /* scrollable area for curtain open */
  background: #050818;
}
#curtain-sticky {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}
#homepage-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 0;
}
#homepage-bg img {
  max-width: 85%;
  max-height: 80%;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
}
#curtain-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
}

/* ===== STEPA SECTION ===== */
#stepa-section {
  position: relative;
  height: 400vh; /* scrollable area for snow */
  background: #1a3a8f;
}
#stepa-sticky {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stepa-container {
  position: relative;
  width: 375px;
  max-width: 90vw;
  z-index: 1;
}
.stepa-container img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}
#stepa-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 5;
  pointer-events: none;
}
#stepa-bg-fx {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Labels */
.section-label {
  position: absolute;
  top: 20px; left: 30px;
  z-index: 20;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.25);
  pointer-events: none;
}
</style>
</head>
<body>

<nav class="nav">
  <h1>М_Фабрика</h1>
  <div class="nav-links">
    <a href="#curtain-section" class="active" id="navCurtain">Кулисы</a>
    <a href="#stepa-section" id="navStepa">Дядя Стёпа</a>
  </div>
</nav>

<div class="scroll-hint" id="scrollHint">
  <span>Скролл</span>
  <div class="arrow"></div>
</div>

<script>
// =============================================
// SECTION 1: THEATRICAL CURTAINS WITH SCROLL
// =============================================
(function() {
  const canvas = document.getElementById('curtain-canvas');
  const ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const FOLDS = 18;
  const startTime = performance.now();

  // Draw a single curtain half
  function drawCurtainHalf(offsetX, width, h, time, side) {
    const foldW = width / FOLDS;

    for (let f = 0; f < FOLDS; f++) {
      let fx;
      if (side === 'left') {
        fx = offsetX + f * foldW;
      } else {
        fx = offsetX + f * foldW;
      }

      const foldPhase = f * 0.9 + (side === 'left' ? 0 : 4);
      const foldDepth = Math.sin(f * Math.PI / (FOLDS - 1)) * 0.6 + 0.4;
      const breathe = Math.sin(time * 0.25 + foldPhase) * 2;
      
      const baseHue = 228;
      const baseSat = 58;
      const lightBase = 15 + foldDepth * 22;
      const highlight = Math.sin(time * 0.15 + f * 0.5) * 3;

      const grad = ctx.createLinearGradient(fx, 0, fx + foldW, 0);
      grad.addColorStop(0, `hsl(${baseHue}, ${baseSat}%, ${lightBase - 5 + highlight}%)`);
      grad.addColorStop(0.25, `hsl(${baseHue}, ${baseSat + 5}%, ${lightBase + 3 + highlight}%)`);
      grad.addColorStop(0.5, `hsl(${baseHue}, ${baseSat + 10}%, ${lightBase + 8 + highlight}%)`);
      grad.addColorStop(0.75, `hsl(${baseHue}, ${baseSat + 5}%, ${lightBase + 1 + highlight}%)`);
      grad.addColorStop(1, `hsl(${baseHue}, ${baseSat}%, ${lightBase - 7 + highlight}%)`);

      ctx.beginPath();
      ctx.moveTo(fx + breathe, 0);
      ctx.lineTo(fx + foldW + breathe, 0);
      
      for (let y = 0; y <= h; y += 8) {
        const ny = y / h;
        const sway = Math.sin(ny * 2.5 + time * 0.3 + foldPhase) * (2 + ny * 5);
        ctx.lineTo(fx + foldW + sway + breathe * (1 - ny * 0.4), y);
      }
      
      for (let y = h; y >= 0; y -= 8) {
        const ny = y / h;
        const sway = Math.sin(ny * 2.5 + time * 0.3 + foldPhase + 0.4) * (2 + ny * 5);
        ctx.lineTo(fx + sway + breathe * (1 - ny * 0.4), y);
      }
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Fold highlight line
      if (f > 0 && f < FOLDS - 1) {
        ctx.beginPath();
        for (let y = 0; y <= h; y += 6) {
          const ny = y / h;
          const sway = Math.sin(ny * 2.5 + time * 0.3 + foldPhase + 0.2) * (2 + ny * 5);
          const lx = fx + foldW * 0.5 + sway + breathe * (1 - ny * 0.4);
          if (y === 0) ctx.moveTo(lx, y);
          else ctx.lineTo(lx, y);
        }
        ctx.strokeStyle = `hsla(${baseHue}, 45%, ${lightBase + 18}%, 0.1)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    // Gold fringe at bottom
    for (let gx = offsetX; gx < offsetX + width; gx += 12) {
      const tWave = Math.sin(gx * 0.04 + time * 0.5) * 6;
      ctx.beginPath();
      ctx.moveTo(gx, h - 15);
      ctx.quadraticCurveTo(gx + 6, h - 2 + tWave, gx + 12, h - 15);
      ctx.strokeStyle = 'rgba(200, 170, 60, 0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Draw top pelmet
  function drawPelmet(w, h, time) {
    const pH = h * 0.055;
    const grad = ctx.createLinearGradient(0, 0, 0, pH + 15);
    grad.addColorStop(0, 'hsl(228, 58%, 20%)');
    grad.addColorStop(0.6, 'hsl(228, 55%, 16%)');
    grad.addColorStop(1, 'hsl(228, 55%, 12%)');
    
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(w + 10, 0);
    ctx.lineTo(w + 10, pH);
    for (let x = w; x >= 0; x -= 35) {
      const dip = Math.sin(x * 0.07 + time * 0.25) * 8 + 12;
      ctx.quadraticCurveTo(x - 17, pH + dip, x - 35, pH);
    }
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Gold trim
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const y = pH + Math.sin(x * 0.07 + time * 0.25) * 8 + 10;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(210, 180, 65, 0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Spotlight
  function drawSpotlight(w, h, time, openAmount) {
    const intensity = 0.06 + openAmount * 0.04 + Math.sin(time * 0.3) * 0.015;
    const sg = ctx.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.45, h * 0.65);
    sg.addColorStop(0, `rgba(200, 210, 255, ${intensity})`);
    sg.addColorStop(0.4, `rgba(150, 170, 240, ${intensity * 0.4})`);
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, w, h);
  }

  // Dust particles
  const dustP = Array.from({length: 50}, () => ({
    x: Math.random(), y: Math.random(),
    sz: 0.4 + Math.random() * 1.5,
    sx: (Math.random() - 0.5) * 0.0002,
    sy: -0.0001 - Math.random() * 0.0003,
    ph: Math.random() * 6.28,
    op: 0.05 + Math.random() * 0.15,
  }));

  function drawDust(w, h, time, openAmount) {
    if (openAmount < 0.1) return;
    dustP.forEach(p => {
      p.x += p.sx + Math.sin(time * 0.3 + p.ph) * 0.0001;
      p.y += p.sy;
      if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); }
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05) p.x = -0.05;
      const dist = Math.abs(p.x - 0.5) * 2;
      const vis = Math.max(0, 1 - dist / (openAmount + 0.01));
      ctx.beginPath();
      ctx.arc(p.x * w, p.y * h, p.sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 230, 255, ${p.op * vis * openAmount})`;
      ctx.fill();
    });
  }

  // Main curtain draw
  function drawCurtain() {
    const t = (performance.now() - startTime) / 1000;
    const w = canvas.width;
    const h = canvas.height;

    // Calculate scroll-based open amount
    const section = document.getElementById('curtain-section');
    const rect = section.getBoundingClientRect();
    const scrollProgress = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));
    const openAmount = Math.pow(scrollProgress, 0.7); // ease

    ctx.clearRect(0, 0, w, h);

    // Dark stage background
    const bg = ctx.createRadialGradient(w * 0.5, h * 0.4, 0, w * 0.5, h * 0.5, h * 0.9);
    bg.addColorStop(0, '#0c1035');
    bg.addColorStop(1, '#040610');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Spotlight behind curtains
    drawSpotlight(w, h, t, openAmount);

    // Stage floor
    const floorY = h * 0.92;
    const floorGrad = ctx.createLinearGradient(0, floorY, 0, h);
    floorGrad.addColorStop(0, 'rgba(20, 25, 60, 0.5)');
    floorGrad.addColorStop(1, 'rgba(8, 10, 30, 0.8)');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, floorY, w, h - floorY);

    // Floor reflection line
    ctx.beginPath();
    ctx.moveTo(0, floorY);
    ctx.lineTo(w, floorY);
    ctx.strokeStyle = 'rgba(100, 120, 180, 0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // LEFT CURTAIN — slides left as openAmount increases
    const curtainW = w * 0.52;
    const leftX = -curtainW * openAmount;
    drawCurtainHalf(leftX, curtainW, h, t, 'left');

    // RIGHT CURTAIN — slides right
    const rightX = w - curtainW + curtainW * openAmount;
    drawCurtainHalf(rightX, curtainW, h, t, 'right');

    // Pelmet (always on top)
    drawPelmet(w, h, t);

    // Side shadows to darken edges for depth
    const lShadow = ctx.createLinearGradient(0, 0, w * 0.08, 0);
    lShadow.addColorStop(0, 'rgba(4, 6, 16, 0.7)');
    lShadow.addColorStop(1, 'transparent');
    ctx.fillStyle = lShadow;
    ctx.fillRect(0, 0, w * 0.08, h);

    const rShadow = ctx.createLinearGradient(w, 0, w - w * 0.08, 0);
    rShadow.addColorStop(0, 'rgba(4, 6, 16, 0.7)');
    rShadow.addColorStop(1, 'transparent');
    ctx.fillStyle = rShadow;
    ctx.fillRect(w - w * 0.08, 0, w * 0.08, h);

    // Dust in spotlight
    drawDust(w, h, t, openAmount);

    // If curtains almost fully open, fade out canvas to reveal homepage image
    if (openAmount > 0.85) {
      const fadeOut = (openAmount - 0.85) / 0.15;
      canvas.style.opacity = 1 - fadeOut * 0.6;
    } else {
      canvas.style.opacity = 1;
    }

    requestAnimationFrame(drawCurtain);
  }
  drawCurtain();
})();


// =============================================
// SECTION 2: DYADYA STEPA — SNOW + MAGIC DUST
// =============================================
(function() {
  const img = document.getElementById('stepaImg');
  const overlay = document.getElementById('stepa-overlay');
  const octx = overlay.getContext('2d');
  const bgCanvas = document.getElementById('stepa-bg-fx');
  const bgCtx = bgCanvas.getContext('2d');

  function resizeOverlay() {
    overlay.width = 750;
    overlay.height = 1166;
    overlay.style.width = '100%';
    overlay.style.height = '100%';
  }
  function resizeBg() {
    bgCanvas.width = bgCanvas.parentElement.offsetWidth;
    bgCanvas.height = bgCanvas.parentElement.offsetHeight;
  }

  resizeOverlay();
  resizeBg();
  window.addEventListener('resize', () => { resizeOverlay(); resizeBg(); });

  // Snowflake class
  class Snowflake {
    constructor(w, h, isBg) {
      this.w = w;
      this.h = h;
      this.isBg = isBg;
      this.reset(true);
    }
    reset(initial) {
      this.x = Math.random() * this.w;
      this.y = initial ? Math.random() * this.h : -20 - Math.random() * 100;
      this.size = this.isBg ? (2 + Math.random() * 5) : (3 + Math.random() * 12);
      this.speed = this.isBg ? (0.3 + Math.random() * 0.8) : (0.5 + Math.random() * 1.5);
      this.drift = Math.random() * Math.PI * 2;
      this.driftSpeed = 0.01 + Math.random() * 0.02;
      this.opacity = this.isBg ? (0.2 + Math.random() * 0.4) : (0.3 + Math.random() * 0.5);
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.02;
      this.arms = 6;
      this.settled = false;
      this.settleY = 0;
      this.settleX = 0;
      // For magic dust explosion
      this.dustVx = 0;
      this.dustVy = 0;
      this.isDust = false;
      this.dustLife = 0;
    }
    explode() {
      this.isDust = true;
      this.dustVx = (Math.random() - 0.5) * 8;
      this.dustVy = -(2 + Math.random() * 6);
      this.dustLife = 1;
      this.size = this.size * 0.4;
    }
  }

  // Overlay snowflakes (on the image)
  const overlayFlakes = [];
  for (let i = 0; i < 80; i++) {
    overlayFlakes.push(new Snowflake(750, 1166, false));
  }

  // Background snowflakes
  const bgFlakes = [];
  for (let i = 0; i < 50; i++) {
    bgFlakes.push(new Snowflake(1920, 1080, true));
  }

  // Snow pile particles (for drifts at bottom of image)
  const snowPile = [];
  const MAX_PILE = 300;

  // Draw a snowflake crystal
  function drawSnowflake(ctx, x, y, size, rotation, opacity) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = Math.max(0.5, size * 0.08);

    // Crystal arms
    for (let a = 0; a < 6; a++) {
      const angle = (a / 6) * Math.PI * 2;
      ctx.save();
      ctx.rotate(angle);
      
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(size, 0);
      ctx.stroke();

      // Side branches
      const bLen = size * 0.35;
      const bPos1 = size * 0.4;
      const bPos2 = size * 0.7;
      
      ctx.beginPath();
      ctx.moveTo(bPos1, 0);
      ctx.lineTo(bPos1 + bLen * 0.5, -bLen);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bPos1, 0);
      ctx.lineTo(bPos1 + bLen * 0.5, bLen);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(bPos2, 0);
      ctx.lineTo(bPos2 + bLen * 0.3, -bLen * 0.6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bPos2, 0);
      ctx.lineTo(bPos2 + bLen * 0.3, bLen * 0.6);
      ctx.stroke();

      ctx.restore();
    }

    // Center dot
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Draw snow drift (accumulated at bottom)
  function drawSnowDrift(ctx, w, h, amount, time) {
    if (amount <= 0) return;
    
    const maxDriftH = h * 0.35 * amount;
    
    // Multiple layers of drift
    for (let layer = 0; layer < 3; layer++) {
      const layerH = maxDriftH * (1 - layer * 0.25);
      const baseY = h - layerH;
      const alpha = 0.7 - layer * 0.15;
      
      ctx.beginPath();
      ctx.moveTo(0, h);
      
      // Bumpy snow surface
      for (let x = 0; x <= w; x += 8) {
        const nx = x / w;
        const bump1 = Math.sin(nx * 8 + layer * 2 + time * 0.1) * layerH * 0.08;
        const bump2 = Math.sin(nx * 15 + layer * 5) * layerH * 0.04;
        const bump3 = Math.sin(nx * 3 + time * 0.05) * layerH * 0.12;
        const y = baseY + bump1 + bump2 + bump3;
        ctx.lineTo(x, y);
      }
      
      ctx.lineTo(w, h);
      ctx.closePath();
      
      const snowGrad = ctx.createLinearGradient(0, baseY, 0, h);
      snowGrad.addColorStop(0, `rgba(230, 240, 255, ${alpha})`);
      snowGrad.addColorStop(0.3, `rgba(210, 225, 245, ${alpha * 0.9})`);
      snowGrad.addColorStop(1, `rgba(190, 210, 240, ${alpha * 0.7})`);
      ctx.fillStyle = snowGrad;
      ctx.fill();
    }
    
    // Sparkles on snow surface
    for (let i = 0; i < 15 * amount; i++) {
      const sx = Math.sin(time * 0.5 + i * 3.7) * 0.5 * w + w * 0.5;
      const sy = h - maxDriftH + Math.sin(i * 2.1) * maxDriftH * 0.3;
      const sparkle = Math.sin(time * 3 + i * 1.3) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + sparkle * 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${sparkle * 0.4 * amount})`;
      ctx.fill();
    }
  }

  // Magic dust particles
  const dustParticles = [];
  const MAX_DUST = 200;

  function spawnDust(x, y, w, h) {
    for (let i = 0; i < 8; i++) {
      if (dustParticles.length >= MAX_DUST) break;
      dustParticles.push({
        x: x + (Math.random() - 0.5) * 40,
        y: y + Math.random() * 20,
        vx: (Math.random() - 0.5) * 6,
        vy: -(1 + Math.random() * 5),
        size: 1 + Math.random() * 4,
        life: 1,
        decay: 0.008 + Math.random() * 0.015,
        hue: 200 + Math.random() * 60,
        sparkle: Math.random() * Math.PI * 2,
      });
    }
  }

  let prevScrollY = 0;
  let snowAmount = 0; // 0 = no snow, 1 = full drifts
  let scrollDir = 0; // positive = down, negative = up

  const startTime = performance.now();

  function draw() {
    const t = (performance.now() - startTime) / 1000;
    const ow = overlay.width;
    const oh = overlay.height;
    const bw = bgCanvas.width;
    const bh = bgCanvas.height;

    // Get scroll progress for stepa section
    const section = document.getElementById('stepa-section');
    const rect = section.getBoundingClientRect();
    const scrollProg = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));
    
    // Detect scroll direction
    const currentScroll = window.scrollY;
    scrollDir = currentScroll - prevScrollY;
    prevScrollY = currentScroll;

    // Snow amount follows scroll
    const targetSnow = scrollProg;
    snowAmount += (targetSnow - snowAmount) * 0.05;

    // If scrolling up and there's snow, spawn magic dust
    if (scrollDir < -3 && snowAmount > 0.05) {
      for (let i = 0; i < 3; i++) {
        spawnDust(
          Math.random() * ow,
          oh - oh * 0.35 * snowAmount + Math.random() * 30,
          ow, oh
        );
      }
    }

    // ---- CLEAR ----
    octx.clearRect(0, 0, ow, oh);
    bgCtx.clearRect(0, 0, bw, bh);

    // ---- BACKGROUND SNOWFLAKES ----
    bgFlakes.forEach(f => {
      f.y += f.speed * (0.3 + snowAmount * 0.7);
      f.x += Math.sin(t * f.driftSpeed * 10 + f.drift) * 0.5;
      f.rotation += f.rotSpeed;
      if (f.y > bh + 20) f.reset(false);
      
      const alpha = f.opacity * Math.min(1, snowAmount * 3);
      if (alpha > 0.01) {
        bgCtx.beginPath();
        bgCtx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(255,255,255,${alpha})`;
        bgCtx.fill();
      }
    });

    // ---- OVERLAY SNOWFLAKES (on image) ----
    overlayFlakes.forEach(f => {
      if (f.isDust) {
        // Flying away as magic dust
        f.x += f.dustVx;
        f.y += f.dustVy;
        f.dustVy += 0.05; // slight gravity
        f.dustLife -= 0.015;
        if (f.dustLife <= 0) {
          f.reset(false);
          f.isDust = false;
        }
        const alpha = f.opacity * f.dustLife;
        octx.beginPath();
        octx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        octx.fillStyle = `rgba(180, 210, 255, ${alpha})`;
        octx.fill();
        // Sparkle trail
        octx.beginPath();
        octx.arc(f.x, f.y, f.size * 1.5, 0, Math.PI * 2);
        octx.fillStyle = `rgba(200, 220, 255, ${alpha * 0.3})`;
        octx.fill();
        return;
      }

      const fallSpeed = f.speed * (0.3 + snowAmount * 1.2);
      f.y += fallSpeed;
      f.x += Math.sin(t * f.driftSpeed * 10 + f.drift) * 0.8;
      f.rotation += f.rotSpeed;

      if (f.y > oh + 20) f.reset(false);

      // Only show falling flakes when there's snow amount
      const showFalling = Math.min(1, snowAmount * 4);
      if (showFalling > 0.01) {
        drawSnowflake(octx, f.x, f.y, f.size, f.rotation, f.opacity * showFalling);
      }
    });

    // ---- SNOW DRIFTS ----
    drawSnowDrift(octx, ow, oh, snowAmount, t);

    // ---- MAGIC DUST PARTICLES ----
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const d = dustParticles[i];
      d.x += d.vx;
      d.y += d.vy;
      d.vy -= 0.03; // float upward
      d.vx *= 0.99;
      d.life -= d.decay;

      if (d.life <= 0) {
        dustParticles.splice(i, 1);
        continue;
      }

      const sparkle = Math.sin(t * 5 + d.sparkle) * 0.3 + 0.7;
      
      // Glow
      octx.beginPath();
      octx.arc(d.x, d.y, d.size * 3, 0, Math.PI * 2);
      octx.fillStyle = `hsla(${d.hue}, 70%, 70%, ${d.life * 0.1 * sparkle})`;
      octx.fill();
      
      // Core
      octx.beginPath();
      octx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      octx.fillStyle = `hsla(${d.hue}, 80%, 85%, ${d.life * 0.7 * sparkle})`;
      octx.fill();

      // Star sparkle
      if (sparkle > 0.85) {
        const ss = d.size * 2;
        octx.beginPath();
        octx.moveTo(d.x - ss, d.y);
        octx.lineTo(d.x + ss, d.y);
        octx.moveTo(d.x, d.y - ss);
        octx.lineTo(d.x, d.y + ss);
        octx.strokeStyle = `hsla(${d.hue}, 90%, 90%, ${d.life * 0.3})`;
        octx.lineWidth = 0.5;
        octx.stroke();
      }
    }

    // ---- LANTERN GLOW (always) ----
    const lanternX = 0.6 * ow;
    const lanternY = 0.33 * oh;
    const gp = 0.5 + Math.sin(t * 1.5) * 0.2;
    const lg = octx.createRadialGradient(lanternX, lanternY, 0, lanternX, lanternY, 55);
    lg.addColorStop(0, `rgba(255, 220, 120, ${0.06 * gp})`);
    lg.addColorStop(1, 'transparent');
    octx.fillStyle = lg;
    octx.beginPath();
    octx.arc(lanternX, lanternY, 55, 0, Math.PI * 2);
    octx.fill();

    // ---- TREE LIGHTS (always) ----
    const treeLights = [
      [0.87, 0.62], [0.90, 0.66], [0.85, 0.68], [0.92, 0.72],
      [0.88, 0.74], [0.84, 0.72], [0.90, 0.78], [0.86, 0.76],
    ];
    treeLights.forEach((tl, i) => {
      const tw = Math.sin(t * 3 + i * 1.7) * 0.5 + 0.5;
      const hue = (i * 60 + t * 30) % 360;
      octx.beginPath();
      octx.arc(tl[0] * ow, tl[1] * oh, 3 + tw * 2, 0, Math.PI * 2);
      octx.fillStyle = `hsla(${hue}, 80%, 60%, ${0.15 + tw * 0.15})`;
      octx.fill();
    });

    requestAnimationFrame(draw);
  }

  setTimeout(draw, 300);
})();

// ===== NAVIGATION ACTIVE STATE =====
window.addEventListener('scroll', () => {
  const curtainRect = document.getElementById('curtain-section').getBoundingClientRect();
  const stepaRect = document.getElementById('stepa-section').getBoundingClientRect();
  
  if (stepaRect.top < window.innerHeight * 0.5) {
    document.getElementById('navCurtain').classList.remove('active');
    document.getElementById('navStepa').classList.add('active');
  } else {
    document.getElementById('navCurtain').classList.add('active');
    document.getElementById('navStepa').classList.remove('active');
  }
  
  // Hide scroll hint after user scrolls
  const hint = document.getElementById('scrollHint');
  if (window.scrollY > 100) hint.style.opacity = '0';
  else hint.style.opacity = '1';
});

// Smooth nav scroll
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelector(a.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
  });
});
