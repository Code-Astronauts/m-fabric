<!--
=====================================================
  SilkWaves — анимированный фон для Tilda Zero Block
=====================================================

ИНСТРУКЦИЯ ПО ВСТАВКЕ В TILDA:

1. Создай Zero Block на странице
   - Нажми "Zero" внизу страницы (или Block Library → Other → Zero Block)
   - Нажми "Edit Block"

2. Настрой Artboard (клик на пустое место в блоке):
   - Window Container height = 100%
   - Background color = #01030f (или любой тёмный)
   - Grid Container alignment = Center

3. Добавь HTML-элемент:
   - Нажми "+" (верхний левый угол) → HTML
   - Вставь ВЕСЬ код ниже (от <style> до закрывающего </div>)

4. Настрой HTML-элемент:
   - Container = Window Container
   - Origin = Left Top
   - Width = 100%, Height = 100%
   - X = 0, Y = 0

5. Контент (текст, кнопки, логотип) добавляй
   обычными элементами Zero Block ПОВЕРХ HTML-элемента.
   У контентных элементов z-index должен быть выше
   (по умолчанию так и будет).

6. Опубликуй страницу — в редакторе анимация
   отображается как текст, работает только после публикации.

=====================================================
-->

<style>
  @keyframes silkSky {
    0%   { opacity: 0; }
    40%  { opacity: 0.3; }
    100% { opacity: 1; }
  }
  @keyframes silk1In {
    0%   { opacity: 0; transform: translateX(-60%) translateY(30%) rotate(-8deg) scale(1.3); }
    27%  { opacity: 0.15; transform: translateX(-40%) translateY(20%) rotate(-5deg) scale(1.2); }
    100% { opacity: 0.9; transform: translateX(0) translateY(0) rotate(0) scale(1); }
  }
  @keyframes silk2In {
    0%   { opacity: 0; transform: translateX(70%) translateY(-20%) rotate(12deg) scale(1.4); }
    27%  { opacity: 0.12; transform: translateX(45%) translateY(-13%) rotate(8deg) scale(1.25); }
    100% { opacity: 0.85; transform: translateX(0) translateY(0) rotate(0) scale(1); }
  }
  @keyframes silk3In {
    0%   { opacity: 0; transform: translateX(-40%) translateY(60%) rotate(-5deg) scale(1.5); }
    27%  { opacity: 0.1; transform: translateX(-26%) translateY(40%) rotate(-3deg) scale(1.35); }
    100% { opacity: 0.7; transform: translateX(0) translateY(0) rotate(0) scale(1); }
  }
  @keyframes silk4In {
    0%   { opacity: 0; transform: translateX(40%) translateY(-50%) rotate(8deg) scale(1.3); }
    27%  { opacity: 0.08; transform: translateX(26%) translateY(-33%) rotate(5deg) scale(1.2); }
    100% { opacity: 0.6; transform: translateX(0) translateY(0) rotate(0) scale(1); }
  }
  @keyframes silkBeam {
    0%   { transform: translate(-150%, -30%) skewX(-15deg) rotate(-8deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.8; }
    100% { transform: translate(300%, 20%) skewX(-15deg) rotate(-8deg); opacity: 0; }
  }

  .silkwaves-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: radial-gradient(ellipse at 30% 50%, #0a1958 0%, #040826 60%, #01030f 100%);
    pointer-events: none;
  }

  .silkwaves-sky {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 40%, #1e3aa8 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(41,82,255,0.2) 0%, transparent 50%);
    opacity: 0;
    animation: silkSky 3s 0.3s forwards cubic-bezier(0.4,0,0.2,1);
  }

  .silkwaves-layer {
    position: absolute;
    left: -20%; top: -20%;
    width: 140%; height: 140%;
    transform-origin: center;
    opacity: 0;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .silkwaves-layer svg {
    width: 100%; height: 100%;
  }

  .silkwaves-layer--1 { animation: silk1In 3.4s 0.4s forwards cubic-bezier(0.4,0,0.2,1); }
  .silkwaves-layer--2 { animation: silk2In 3.7s 0.8s forwards cubic-bezier(0.4,0,0.2,1); }
  .silkwaves-layer--3 { animation: silk3In 3.9s 1.1s forwards cubic-bezier(0.4,0,0.2,1); }
  .silkwaves-layer--4 { animation: silk4In 4.2s 1.4s forwards cubic-bezier(0.4,0,0.2,1); }

  .silkwaves-beam {
    position: absolute;
    top: -20%; left: 0;
    width: 600px; height: 140%;
    background: linear-gradient(105deg, transparent 45%, rgba(120,170,255,0.25) 50%, transparent 55%);
    transform: translate(-150%, -30%) skewX(-15deg) rotate(-8deg);
    animation: silkBeam 2.65s 2.6s forwards ease-in-out;
    pointer-events: none;
  }
</style>

<div class="silkwaves-wrap">

  <!-- Sky glow -->
  <div class="silkwaves-sky"></div>

  <!-- Silk layer 1 -->
  <div class="silkwaves-layer silkwaves-layer--1">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="none" overflow="visible">
      <defs>
        <linearGradient id="sw-g1" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#4a7bff" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#6a9bff" stop-opacity="0.8"/>
          <stop offset="1" stop-color="#1a3aa8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M -2500 1400 Q -900 900 -100 500 Q 300 300 700 480 T 1700 420 T 3300 260 T 4600 300 L 4600 2000 L -2500 2000 Z" fill="url(#sw-g1)"/>
    </svg>
  </div>

  <!-- Silk layer 2 -->
  <div class="silkwaves-layer silkwaves-layer--2">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="none" overflow="visible">
      <defs>
        <linearGradient id="sw-g2" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#2952ff" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#5a8aff" stop-opacity="0.7"/>
          <stop offset="1" stop-color="#0a1650" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M -2500 1500 Q -1100 950 -100 550 Q 400 350 800 540 T 1700 480 T 3300 320 T 4600 370 L 4600 2000 L -2500 2000 Z" fill="url(#sw-g2)"/>
    </svg>
  </div>

  <!-- Silk layer 3 -->
  <div class="silkwaves-layer silkwaves-layer--3">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="none" overflow="visible">
      <defs>
        <linearGradient id="sw-g3" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#1a3aa8" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#3a6aff" stop-opacity="0.6"/>
          <stop offset="1" stop-color="#05092a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M -2500 1600 Q -1300 1020 -100 620 Q 500 420 900 600 T 1700 560 T 3300 400 T 4600 440 L 4600 2000 L -2500 2000 Z" fill="url(#sw-g3)"/>
    </svg>
  </div>

  <!-- Silk layer 4 -->
  <div class="silkwaves-layer silkwaves-layer--4">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="none" overflow="visible">
      <defs>
        <linearGradient id="sw-g4" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#0a1650" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#2a4ad8" stop-opacity="0.5"/>
          <stop offset="1" stop-color="#01030f" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M -2500 1700 Q -1500 1100 -100 700 Q 600 500 1000 680 T 1700 640 T 3300 480 T 4600 520 L 4600 2000 L -2500 2000 Z" fill="url(#sw-g4)"/>
    </svg>
  </div>

  <!-- Light beam sweep -->
  <div class="silkwaves-beam"></div>

</div>
